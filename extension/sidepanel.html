<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VDO Gen Auto Pilot</title>
<style>
/* ── Thin side panel ──────────────────────────────────────────────────
   เดิม Side Panel เคยเป็นศูนย์ควบคุมเต็ม (STANDBY/START ENGINE/คลังวิดีโอ)
   ซ้ำกับเว็บแอป localhost:3001 ที่เป็นศูนย์ควบคุมหลักแล้ว → ตัดเหลือบาง ๆ:
   สถานะเชื่อมต่อ + ปุ่มเปิดแอป + ทางลัดดูดสินค้า. Dashboard อยู่บนเว็บแอป. */
@font-face{font-family:'IBM Plex Sans Thai';font-weight:400;font-display:swap;src:url('fonts/ibm-plex-sans-thai-400-thai.woff2') format('woff2');unicode-range:U+0E01-0E5B,U+200C-200D,U+25CC;}
@font-face{font-family:'IBM Plex Sans Thai';font-weight:400;font-display:swap;src:url('fonts/ibm-plex-sans-thai-400-latin.woff2') format('woff2');unicode-range:U+0000-00FF;}
@font-face{font-family:'IBM Plex Sans Thai';font-weight:600;font-display:swap;src:url('fonts/ibm-plex-sans-thai-600-thai.woff2') format('woff2');unicode-range:U+0E01-0E5B,U+200C-200D,U+25CC;}
@font-face{font-family:'IBM Plex Sans Thai';font-weight:600;font-display:swap;src:url('fonts/ibm-plex-sans-thai-600-latin.woff2') format('woff2');unicode-range:U+0000-00FF;}
@font-face{font-family:'IBM Plex Sans Thai';font-weight:700;font-display:swap;src:url('fonts/ibm-plex-sans-thai-700-thai.woff2') format('woff2');unicode-range:U+0E01-0E5B,U+200C-200D,U+25CC;}
@font-face{font-family:'IBM Plex Sans Thai';font-weight:700;font-display:swap;src:url('fonts/ibm-plex-sans-thai-700-latin.woff2') format('woff2');unicode-range:U+0000-00FF;}
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#faf7f0; --card:#fffdf8; --accent:#1f5c3d; --orange:#e8743b;
  --muted:#6e6557; --faint:#a89e8c; --fg:#1a1814; --line:rgba(26,24,20,.12);
  --sans:'IBM Plex Sans Thai',system-ui,-apple-system,sans-serif;
}
body{font-family:var(--sans);background:var(--bg);color:var(--fg);
  min-height:100vh;display:flex;flex-direction:column;padding:20px 18px;gap:18px}
.brand{display:flex;align-items:center;gap:12px}
.brand img{width:40px;height:40px;border-radius:11px;object-fit:cover}
.brand h1{font-size:16px;font-weight:700;letter-spacing:-.2px}
.brand p{font-size:11px;color:var(--faint);margin-top:2px}

.status{display:flex;align-items:center;gap:10px;background:var(--card);
  border:1px solid var(--line);border-radius:14px;padding:14px 16px}
.dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;background:var(--faint);
  box-shadow:0 0 0 4px rgba(168,158,140,.18)}
.dot.on{background:#22a06b;box-shadow:0 0 0 4px rgba(34,160,107,.2)}
.dot.warn{background:var(--orange);box-shadow:0 0 0 4px rgba(232,116,59,.2)}
.status .txt{flex:1}
.status .txt b{font-size:13px;font-weight:600}
.status .txt span{display:block;font-size:11px;color:var(--muted);margin-top:2px}

.btn{border:0;cursor:pointer;border-radius:13px;font-family:var(--sans);
  font-weight:700;display:flex;align-items:center;justify-content:center;gap:9px;
  transition:filter .15s,transform .1s}
.btn:active{transform:translateY(1px)}
.btn:hover{filter:brightness(1.05)}
.btn-main{width:100%;padding:16px;font-size:15px;color:#fff;
  background:linear-gradient(135deg,var(--accent),#153f2a);
  box-shadow:0 8px 22px rgba(31,92,61,.28)}
.btn-sub{width:100%;padding:13px;font-size:13px;color:var(--accent);
  background:var(--card);border:1px solid var(--line);font-weight:600}
.hint{font-size:11px;color:var(--faint);line-height:1.6;text-align:center}
.spacer{flex:1}
.foot{font-size:10.5px;color:var(--faint);text-align:center}
</style>
</head>
<body>
  <div class="brand">
    <img src="logo.png" alt="">
    <div>
      <h1>Shopee VDO Gen</h1>
      <p>ตัวช่วยดูดสินค้า · ศูนย์ควบคุมอยู่บนเว็บแอป</p>
    </div>
  </div>

  <div class="status">
    <span class="dot" id="dot"></span>
    <div class="txt">
      <b id="lbl">กำลังตรวจการเชื่อมต่อ…</b>
      <span id="sub">แอป VDO Gen ที่ localhost:3001</span>
    </div>
  </div>

  <button class="btn btn-main" id="openApp">เปิดแอป VDO Gen</button>

  <button class="btn btn-sub" id="openShopee">เปิดหน้า Shopee Affiliate</button>
  <button class="btn btn-sub" id="scrapeNow">ดูดสินค้าจากแท็บ Affiliate</button>

  <div class="hint" id="hint">ดูดสินค้าได้จากปุ่มลอยบนหน้า Shopee ด้วย — สินค้าจะเข้าคลังในแอปอัตโนมัติ</div>

  <div class="spacer"></div>
  <div class="foot" id="foot"></div>

  <script src="sidepanel.js"></script>
</body>
</html>
