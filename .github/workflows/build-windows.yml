name: Build Windows Installer

# build .exe บน Windows runner ของ GitHub (ฟรี) — ไม่ต้องมีเครื่อง Windows เอง
# - กดรันเองได้จากแท็บ Actions (workflow_dispatch)
# - หรือ push tag ขึ้นต้น v (เช่น v1.0.1) → build + แนบไฟล์เข้า GitHub Release ให้ด้วย
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

concurrency:
  group: build-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── โหลด binary ที่ต้องแถมไปกับแอป (adb / scrcpy / ffmpeg) ลง electron/bin ──
      - name: Download bundled binaries
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          New-Item -ItemType Directory -Force -Path electron/bin | Out-Null

          # adb (Google platform-tools)
          Invoke-WebRequest "https://dl.google.com/android/repository/platform-tools-latest-windows.zip" -OutFile pt.zip
          Expand-Archive pt.zip -DestinationPath pt -Force
          Copy-Item pt/platform-tools/adb.exe,pt/platform-tools/AdbWinApi.dll,pt/platform-tools/AdbWinUsbApi.dll electron/bin/ -Force

          # scrcpy — ★ ตรึงเวอร์ชันให้ตรงกับ SCRCPY_VERSION ใน desktop/services/adb/scrcpy_control.py
          #   (โปรโตคอล client/server ต้อง version เดียวกัน ไม่งั้น touch injection = caption พัง)
          #   ถ้าจะอัปเกรด scrcpy: แก้ทั้ง SCRCPY_VER ที่นี่ + SCRCPY_VERSION ในโค้ด ให้ตรงกัน
          $SCRCPY_VER = "4.0"
          gh release download -R Genymobile/scrcpy "v$SCRCPY_VER" -p "scrcpy-win64-*.zip" -D scrcpyzip
          $z = (Get-ChildItem scrcpyzip/*.zip)[0]
          Expand-Archive $z.FullName -DestinationPath scrcpy -Force
          $sd = (Get-ChildItem scrcpy -Directory)[0]
          Copy-Item "$($sd.FullName)/*" electron/bin/ -Recurse -Force
          Write-Host "scrcpy ที่แถม = $($sd.Name) (ตรึงไว้ที่ v$SCRCPY_VER ให้ตรงกับโค้ด)"

          # ffmpeg (BtbN static build)
          gh release download -R BtbN/FFmpeg-Builds -p "ffmpeg-master-latest-win64-gpl.zip" -D ffzip
          Expand-Archive ffzip/ffmpeg-master-latest-win64-gpl.zip -DestinationPath ff -Force
          Copy-Item (Get-ChildItem ff -Recurse -Filter ffmpeg.exe)[0].FullName electron/bin/ -Force

          Write-Host "=== electron/bin ==="
          Get-ChildItem electron/bin | Select-Object Name, Length

      # ── build web (Next static export → web/out) ──
      - name: Build web
        shell: pwsh
        run: |
          cd web
          npm install
          npm run build

      # ── build backend (PyInstaller → desktop/dist/vgap-server.exe) ──
      - name: Build backend
        shell: pwsh
        run: |
          cd desktop
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          pyinstaller --noconfirm vgap-server.spec
          Get-ChildItem dist

      # ── build installer (electron-builder → dist/...Setup.exe) ──
      - name: Build installer
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd electron
          npm install
          npx electron-builder --win --publish never
          Write-Host "=== dist ==="
          Get-ChildItem ../dist

      # ── ประกอบ "โฟลเดอร์พกพา" — ก๊อปไปเครื่องไหนก็ดับเบิลคลิกใช้ได้ ไม่ต้องติดตั้งอะไร ──
      - name: Assemble portable folder
        shell: pwsh
        run: |
          $P = "portable-build/VDO-Gen-AutoPilot"
          New-Item -ItemType Directory -Force -Path "$P/web/out","$P/bin" | Out-Null
          Copy-Item desktop/dist/vgap-server.exe "$P/" -Force          # server (Python ในตัว)
          Copy-Item "web/out/*"     "$P/web/out/" -Recurse -Force      # หน้าเว็บ prebuilt
          Copy-Item "electron/bin/*" "$P/bin/"    -Recurse -Force      # adb + scrcpy v4.0 + ffmpeg
          Copy-Item "portable/*"    "$P/"         -Recurse -Force      # ตัวเปิด/ปิด + อ่านก่อน
          Write-Host "=== โฟลเดอร์พกพา ==="
          Get-ChildItem $P

      - name: Upload portable folder
        uses: actions/upload-artifact@v4
        with:
          name: vgap-portable-folder
          path: portable-build/VDO-Gen-AutoPilot
          if-no-files-found: error
          retention-days: 30

      # ── อัปโหลด installer (.exe) ด้วย เผื่ออยากใช้แบบติดตั้ง ──
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: vgap-windows-installer
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml
          if-no-files-found: error
          retention-days: 30

      # ── ถ้า push เป็น tag v* → แนบไฟล์เข้า GitHub Release (auto-update ดึงได้ ถ้าตั้ง provider=github) ──
      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB ใหม่ (แยกจาก job "build" ด้านบน — ไม่แตะ/ไม่พึ่งของเดิม)
  # "build-source-installer": ตัวติดตั้งแบบ RUN-FROM-SOURCE ด้วย NSIS
  #   - ผู้ใช้ปลายทางรัน python main.py (ผ่าน เปิดโปรแกรม.vbs) — ไม่ใช้ PyInstaller/electron
  #     → เลี่ยง antivirus false-positive (เหตุผลที่เจ้าของทิ้ง .exe แบบ compiled)
  #   - unsigned: SmartScreen เตือน 1 ครั้ง (More info → Run anyway)
  #   - web/out commit แล้ว → ไม่ต้อง build node; backend รันจากซอร์ส → ไม่ต้อง PyInstaller
  # ═══════════════════════════════════════════════════════════════════════════
  build-source-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # ── โหลด binary (adb / scrcpy v4.0 / ffmpeg) ลง electron/bin — ก๊อป logic จาก job "build" ──
      - name: Download bundled binaries
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          New-Item -ItemType Directory -Force -Path electron/bin | Out-Null

          # adb (Google platform-tools)
          Invoke-WebRequest "https://dl.google.com/android/repository/platform-tools-latest-windows.zip" -OutFile pt.zip
          Expand-Archive pt.zip -DestinationPath pt -Force
          Copy-Item pt/platform-tools/adb.exe,pt/platform-tools/AdbWinApi.dll,pt/platform-tools/AdbWinUsbApi.dll electron/bin/ -Force

          # scrcpy — ★ ตรึง v4.0 ให้ตรงกับ SCRCPY_VERSION ในโค้ด (โปรโตคอลต้อง version เดียวกัน)
          $SCRCPY_VER = "4.0"
          gh release download -R Genymobile/scrcpy "v$SCRCPY_VER" -p "scrcpy-win64-*.zip" -D scrcpyzip
          $z = (Get-ChildItem scrcpyzip/*.zip)[0]
          Expand-Archive $z.FullName -DestinationPath scrcpy -Force
          $sd = (Get-ChildItem scrcpy -Directory)[0]
          Copy-Item "$($sd.FullName)/*" electron/bin/ -Recurse -Force

          # ffmpeg (BtbN static build)
          gh release download -R BtbN/FFmpeg-Builds -p "ffmpeg-master-latest-win64-gpl.zip" -D ffzip
          Expand-Archive ffzip/ffmpeg-master-latest-win64-gpl.zip -DestinationPath ff -Force
          Copy-Item (Get-ChildItem ff -Recurse -Filter ffmpeg.exe)[0].FullName electron/bin/ -Force

          Write-Host "=== electron/bin ==="
          Get-ChildItem electron/bin | Select-Object Name, Length

      # ── ประกอบ payload folder (กรองไฟล์ที่ไม่ต้องการออกก่อนส่งเข้า NSIS) ──
      - name: Assemble payload
        shell: pwsh
        run: |
          $P = "payload"
          Remove-Item $P -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $P | Out-Null

          function RC($src, $dst, [string[]]$xd) {
            $ra = @($src, $dst, "/E", "/NFL", "/NDL", "/NJH", "/NJS", "/NP")
            if ($xd) { $ra += "/XD"; $ra += $xd }
            robocopy @ra | Out-Null
            if ($LASTEXITCODE -ge 8) { throw "robocopy ล้มเหลว: $src -> $dst (code $LASTEXITCODE)" }
          }

          # desktop source (ตัด .venv / data / __pycache__)
          RC "desktop"      "$P\desktop"      @(".venv", "data", "__pycache__")
          # หน้าเว็บ prebuilt + public (commit แล้ว → ไม่ต้อง build node)
          RC "web\out"      "$P\web\out"      @("__pycache__")
          RC "web\public"   "$P\web\public"   $null
          # binary ที่แถม (adb / scrcpy v4.0 / ffmpeg)
          RC "electron\bin" "$P\electron\bin" $null
          # extension (ตัด node_modules / __pycache__ / .git)
          RC "extension"    "$P\extension"    @("node_modules", "__pycache__", ".git")

          # ตัวติดตั้ง + ตัวเปิด (*.vbs / *.bat / *.ps1) และคู่มือ (*.md) — ระดับ root
          Copy-Item -Path *.vbs, *.bat, *.ps1, *.md -Destination "$P\" -Force
          # logo ตัวติดตั้ง (app.ico) — NSIS MUI_ICON + shortcut ต้องใช้ (อยู่ใน portable/)
          if (Test-Path "portable\app.ico") { Copy-Item "portable\app.ico" "$P\" -Force }

          cmd /c "exit 0"   # reset $LASTEXITCODE (robocopy คืน code 1 = สำเร็จ กัน step แดง)
          Write-Host "=== payload root ==="
          Get-ChildItem $P

      # ── build installer ด้วย NSIS (choco) → VDO-Gen-Setup.exe ──
      - name: Build NSIS installer
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          $src     = "${{ github.workspace }}"
          $payload = Join-Path $src "payload"
          $out     = Join-Path $src "VDO-Gen-Setup.exe"
          $nsis    = "C:\Program Files (x86)\NSIS\makensis.exe"
          if (-not (Test-Path $nsis)) { $nsis = "makensis" }
          & $nsis "/DPAYLOAD_DIR=$payload" "/DOUTFILE=$out" "$src\build\installer.nsi"
          if ($LASTEXITCODE -ne 0) { throw "makensis ล้มเหลว (code $LASTEXITCODE)" }
          Write-Host "=== output ==="
          Get-ChildItem $out | Select-Object Name, Length

      - name: Upload source installer
        uses: actions/upload-artifact@v4
        with:
          name: vgap-windows-source-installer
          path: VDO-Gen-Setup.exe
          if-no-files-found: error
          retention-days: 30

      # ── ถ้า push เป็น tag v* → แนบ installer เข้า GitHub Release ด้วย ──
      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: VDO-Gen-Setup.exe
